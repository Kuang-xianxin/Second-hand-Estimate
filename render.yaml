services:
  - type: pserv
    name: second-hand-estimate-backend
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    autoDeployTrigger: commit
    envVars:
      - key: BACKEND_PORT
        value: "10000"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////app/render-data/guessr.db
      - key: COOKIE_FILE
        value: /app/render-data/xianyu_cookies.txt
      - key: STORAGE_STATE_FILE
        value: /app/render-data/xianyu_storage_state.json
      - key: ADMIN_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: DOUBAO_API_KEY
        sync: false
    disk:
      name: app-data
      mountPath: /app/render-data
      sizeGB: 10

  - type: web
    name: second-hand-estimate
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./frontend/Dockerfile.render
    dockerContext: ./frontend
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: BACKEND_HOSTPORT
        fromService:
          name: second-hand-estimate-backend
          type: pserv
          property: hostport
