services:
  - type: web
    name: second-hand-estimate-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: BACKEND_PORT
        value: "10000"
      - key: ADMIN_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: DOUBAO_API_KEY
        sync: false

  - type: web
    name: second-hand-estimate
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./frontend/Dockerfile.render
    dockerContext: ./frontend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "10000"
      - key: BACKEND_HOSTPORT
        fromService:
          name: second-hand-estimate-backend
          type: web
          property: hostport
